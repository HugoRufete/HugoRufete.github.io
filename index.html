<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hugo Rufete — Game Developer & Technical Artist. Portfolio of game development, procedural animation and dynamic lighting.">
<title>Hugo Rufete — Game Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- CUSTOM CURSOR -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- INTRO LOADING SCREEN -->
<div id="intro-overlay">
  <div class="intro-line">HUGO RUFETE</div>
  <div class="intro-line">game developer · technical artist</div>
  <div class="intro-bar"><div class="intro-bar-fill"></div></div>
</div>

<!-- PARTICLE CANVAS -->
<canvas id="bg-canvas"></canvas>

<!-- SITE HEADER -->
<header id="site-header">
  <a class="brand" href="#top">Hugo Rufete<span>.</span></a>
  <nav class="site-nav">
    <a href="#games">Work</a>
    <a href="#experience">About</a>
  </nav>
  <nav class="site-links">
    <a href="https://github.com/HugoRufete" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>
    <a href="https://linkedin.com/in/hugorufete" target="_blank" rel="noopener" aria-label="LinkedIn">LinkedIn</a>
  </nav>
</header>

<!-- MAIN -->
<main id="top">
  <div class="layout-split">

    <!-- SIDEBAR -->
    <aside class="layout-split__sidebar">
      <div class="sidebar-inner">
        <h1 class="identity-name">Hugo Rufete</h1>
        <p class="identity-sub">The <b>Portfolio</b><br>of a <b>Game Developer</b></p>

        <menu class="social-links" aria-label="Social links">
          <li><a href="https://github.com/HugoRufete" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a></li>
          <li><a href="https://linkedin.com/in/hugorufete" target="_blank" rel="noopener" aria-label="LinkedIn">LinkedIn</a></li>
          <li><a href="mailto:hugorufete@gmail.com" aria-label="Email">Email</a></li>
        </menu>

        <!-- Table of contents — rellenado por main.js -->
        <menu class="toc" aria-label="Table of contents"></menu>
      </div>
    </aside>

    <!-- CONTENT -->
    <div class="layout-split__content">
      <!-- Feature: vídeo hero como banner editorial superior -->
      <div class="feature">
        <video class="feature-video" autoplay muted loop playsinline poster="img/ui/hero-poster.png">
          <source src="video/hero.mp4" type="video/mp4">
        </video>
        <div class="feature-overlay">
          <span class="feature-tag">Game Developer &amp; Technical Artist</span>
        </div>
      </div>

      <!-- Secciones — rellenadas por main.js desde SECTIONS -->
      <div id="sections"></div>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer id="site-footer">
  <div class="footer-inner">
    <span class="footer-brand">Hugo Rufete<span>.</span></span>
    <menu class="social-links" aria-label="More links">
      <li><a href="https://github.com/HugoRufete" target="_blank" rel="noopener">GitHub</a></li>
      <li><a href="https://linkedin.com/in/hugorufete" target="_blank" rel="noopener">LinkedIn</a></li>
      <li><a href="mailto:hugorufete@gmail.com">Email</a></li>
    </menu>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
